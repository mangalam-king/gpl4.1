<!DOCTYPE html>
<html>
<head>
<title>GPL 4.1 Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h2>GPL 4.1 Registration</h2>
<form id="form">
<input id="name" placeholder="Full Name" required>
<input id="father" placeholder="Father Name" required>
<input type="date" id="dob" required>
<input id="age" placeholder="Age" readonly>
<input type="email" id="email" placeholder="Email" required>
<input id="mobile" placeholder="Mobile" required>
<input id="addr1" placeholder="Address Line 1" required>
<input id="addr2" placeholder="Address Line 2">
<input id="addr3" placeholder="Address Line 3">
<button type="submit">Submit</button>
</form>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
